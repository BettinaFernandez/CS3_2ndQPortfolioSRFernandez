<head>

<body>

<script> ///Sir im so sorry tinamad ako magstyling adasfihasdifhasifhhd

    const KEY = 'club_applications'; //so this is where the data is stored in the storage thingy

    function loadApps() { //gets the applications 
      const raw = localStorage.getItem(KEY);
      if (raw){  
        return JSON.parse(raw); //the data is returned as a string to theee list thing
      }
      else{
        return [];
      }
    }

    function saveApps(entries) { //saves the list and in the storage browser something
      localStorage.setItem(KEY, JSON.stringify(entries));
    }

    function noInfo(field){
        if(field.value == ""){
            field.style.backgroundColor = "yellow";
            field.style.border = "3px solid red";
        }
        else {
            field.style.border = "";
            field.style.backgroundColor = "";
        }
    }

    function escapeHtml(s) { //sir i trust your code so i guesssss this avoids some of the html to ano ano with the js
      let str = String(s);
      let escapedStr = "";
      for (let i = 0; i < str.length; i++) {
        let c = str[i];
        if (c === '&') escapedStr += '&amp;';
        else if (c === '<') escapedStr += '&lt;';
        else if (c === '>') escapedStr += '&gt;';
        else if (c === '"') escapedStr += '&quot;';
        else if (c === "'") escapedStr += '&#39;';
        else escapedStr += c;
      }
      return escapedStr;
    }
</script>

<div class="form">
<form id="appForm">
    <fieldset>
        <label>
            STUDENT ID:
            <input type="number" id="studentID" required onblur="noInfo(this)">
        </label> <br>

        <label>
            FULL NAME:
            <input type="text" id="fullName" required onblur="noInfo(this)"> 
        </label> <br>

        <label>
            BIRTHDAY:
            <input type="date" id="birthday" required onblur="noInfo(this)">
        </label> <br>

        <label>
            EMAIL ADDRESS:
            <input type="email" id="emailAddress" required onblur="noInfo(this)">
        </label> <br>
    </fieldset>

    <fieldset>
        <label>
            MOBILE PHONE:
            <input type="text" id="mobilePhone" required onblur="noInfo(this)">
        </label> <br>

        <label>
            GRADE LEVEL:
            <select id="gradeLevel" required>
                <option value="Grade 7"> Grade 7 </option>
                <option value="Grade 8"> Grade 8 </option>
                <option value="Grade 9"> Grade 9 </option>
                <option value="Grade 10"> Grade 10 </option>
                <option value="Grade 11"> Grade 11 </option>
                <option value="Grade 12"> Grade 12 </option>
            </select>
        </label> <br>

        <label>
            INTERN:
            <input type="radio" name="memberType" value="intern" checked>
        </label> <br>

        <label>
            EXTERN:
            <input type="radio" name="memberType" value="extern">
        </label> <br>

        <label>
            PREFERRED CLUB:
            <select id="clubs" required onblur="noInfo(this)">
                <option value="XYZ"> Pisay XYZ </option>

                <option value="Volant"> Volant </option>

                <option value="Bake_Club"> Bake Club </option>
            </select>
        </label> <br>

        <label>
            WHY DO YOU WANT TO JOIN?:
            <textarea id="reason" required onblur="noInfo(this)"></textarea>
        </label> <br>
    </fieldset>

    <br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset" onclick="return confirm('Are you sure you want to clear the form?')">
    
    <button type="button" class="view-button" onclick="window.location.href='viewSignUps.html'">View Signups</button>
</form>
</div>

<script>

    const mainForm = document.getElementById('appForm');

    mainForm.onsubmit = function(event) {
        event.preventDefault();

        const check = confirm("Are you certain to submit this form?");
        if (!check) return;

        const application = { //this one collects all the info from the form and stores it 
            id: Date.now(),
            studentID: document.getElementById('studentID').value,
            name: document.getElementById('fullName').value,
            club: document.getElementById('clubs').value,
            time: new Date().toLocaleTimeString()
        };

        const apps = loadApps(); //loads the list

        apps.push(application); //saves the new sign-upper

        saveApps(apps); //loads in the browser

        alert("Application Saved Successfully!");
        mainForm.reset();
    };
</script>

</body>
