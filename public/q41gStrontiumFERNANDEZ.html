<DOCTYPE html>
    <html>
        <head>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <script src="q41gSCRIPT.js" defer></script>
            
            <style>
                body{
                    display: flex;
                    justify-content: center;
                    align-items: center; 
                    height: 100vh;
                    margin: 0;
                    background-image:url("../assets/racket\ rivals_imgupscaler.ai_General_4K.jpg");
                    background-size: cover;
                    background-position: center;
                    font-family:Verdana, Geneva, Tahoma, sans-serif;
                }
                .box{
                    background-color: rgba(255, 255, 255, 0.184);
                    width: 800px;
                    backdrop-filter: blur(5px);
                    -webkit-backdrop-filter: blur(10px);
                    border-radius: 40px;
                    text-align: center;
                    padding: 10px;
                    color: rgb(19, 16, 73);
                }
                #racket-rivals{
                    text-align: center;
                    line-height: 30px;
                    color: rgb(19, 16, 73);
                    font-weight: bold;
                    padding: 10px
                }
                .stars i{
                    margin: 5px;
                    color: rgb(19, 16, 73);
                    font-size: 35px;
                    cursor: pointer;
                    transition: color 0.2s ease;
                }
                .stars i.active{
                    color: rgb(236, 216, 0);
                }
                .racket-output {
                    background: rgba(255, 255, 255, 0.5);
                    border: 1px solid rgba(255, 255, 255, 0.3);
                    border-radius: 15px;
                    padding: 10px;
                    margin: 10px auto;
                    width: 50%;
                    color: rgb(19, 16, 73);
                    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                }
                .goldstars {
                    color: rgb(255, 111, 0);
                    font-size: 25px;
                }

                .racket_button {
                    border: none;
                    outline: none;
                    padding: 12px 25px;
                    border-radius: 20px;
                    cursor: pointer;
                    background-color: rgb(33, 90, 197);
                    color: white;
                    font-weight: bold;
                    transition: transform 0.2s ease;
                    margin: 10px;
                }

                .racket_button:hover {
                    transform: scale(1.05);
                }

                #rank{
                    border: none;
                    border-radius: 20px;
                    padding: 4px;
                    cursor: pointer;
                    background-color: rgb(255, 255, 255);
                    font-weight: bold;
                }

                #racket-name {
                    border: none;
                    border-radius: 20px;
                    padding: 4px;
                    cursor: pointer;
                    background-color: rgb(255, 255, 255);
                    font-weight: bold;
                }

                .home-link {
                    position: fixed; 
                    top: 20px;
                    left: 20px;
                    z-index: 1000;
                }

                .home-link img {
                    width: 100px;
                    height: auto;
                    cursor: pointer;
                    transition: transform 0.3s ease;
                    transition: rotate 0.3 ease;
                    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
                }

                .home-link img:hover {
                     transform: scale(1.3) rotate(7deg);

                }
                .deleteButton {
                    border: none;
                    outline: none;
                    padding: 8px 20px;
                    border-radius: 20px;
                    cursor: pointer;
                    background-color: #ff4d4d;
                    color: white;
                    font-weight: bold;
                    font-size: 12px;
                    transition: transform 0.2s ease, background-color 0.2s ease;
                    margin-top: 10px;
                    display: block;
                    margin-left: auto;
                    margin-right: auto;
                }

                .deleteButton:hover {
                    background-color: #cc0000;
                    transform: scale(1.05);
                }

                .deleteButton i {
                    margin-right: 5px;
                }
                


            </style>
        </head>
        <body>

<section class="box">
    <h1> Racket Rivals: Make your racket </h1>

    <form id="racket-rivals">
        <div class="form">
            <label> Racket Name: </label>
            <input type="text" id="racket-name">
        </div>

        <div class="form">
            <label> Racket Rank: </label>
            <select id="rank">
                <option value="" disabled selected hidden> Select a Rank </option>
                <option value="Divine"> Divine </option>
                <option value="Spirit"> Spirit </option>
                <option value="Mythical"> Mythical </option>
                <option value="Legendary"> Legendary </option>
                <option value="Rare"> Rare </option>
                <option value="Common"> Common </option>
            </select>
        </div>

        <div class="form">
            <label> Racket Rating: </label>
            <div class="stars">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
            </div>
        </div>

        <button type="button" onclick="saveRacket()" class="racket_button">Add New Racket</button>
        <div id="output"></div>
    </form>
</section>

<a href="../index.html" class="home-link">
    <img src="../assets/Untitled design (1).png">
</a>

</body>
</html>
